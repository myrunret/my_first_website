<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Micro-action{% endblock %}</title>
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon1.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="progressBar"></div>
    <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('action') }}">Action</a>
        <a href="{{ url_for('sources') }}">Data</a>
        <a href="{{ url_for('tech') }}">Tech</a>
        <a href="{{ url_for('contact') }}">Contact</a>
    </nav>
    <main id="main-content">
        {% block content %}
        <!-- Page content goes here -->
        {% endblock %}
    </main>
    <!-- <footer aria-label="Site footer">
      <p class="footer-lead">Thank you for visiting this website.</p>
      <p class="footer-tagline">Let's create a sustainable future together.</p>
    </footer> -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %} 
    {% endblock %}
</body>
</html>
